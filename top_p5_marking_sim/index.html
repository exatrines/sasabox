<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TOP P5 Marking Sim</title>
  <style>
    * { box-sizing: border-box; }
    
    body { 
      font-family: sans-serif; 
      text-align: center; 
      margin: 18px; 
    }

    .controls { 
      margin-bottom: 16px; 
    }

    .controls select,
    .controls button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .party-list { 
      width: 1000px; 
      margin: auto; 
      border: 3px solid #ccc; 
      transition: border-color 0.3s;
    }

    .party-list.is-correct { border-color: #4caf50; }
    .party-list.is-incorrect { border-color: #f44336; }

    .row { 
      display: flex; 
      align-items: center; 
      padding: 3px 6px; 
      min-height: 64px;
      border-bottom: 1px solid #f0f0f0;
    }

    .row:last-child { border-bottom: none; }

    /* マーカー表示領域 */
    .col { width: 58px; display: flex; align-items: center; justify-content: center; }
    .input-col { margin-right: 8px; border-right: 1px solid #bdbdbd; }
    .answer-col { margin-left: 8px; padding-left: 4px; border-left: 1px solid #bdbdbd; }

    .answer-area,
    .marker-area {
      width: 48px;
      min-height: 48px;
      border: 1px solid #888;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .answer-area { background: #ececec; }
    .marker-area { background: #fafafa; margin-right: 6px; }
    .marker-area.is-correct { background: #e8f7e8; border-color: #4caf50; }
    .marker-area.is-incorrect { background: #fdeaea; border-color: #f44336; }

    /* マーカーチップ */
    .marker-chip { 
      font-size: 12px;
      padding: 2px 7px;
      border-radius: 4px;
    }

    /* スプライト画像 (.marker-icon は marker-area用) */
    .marker-icon,
    .btn-marker-icon {
      width: 43px;
      height: 43px;
      display: inline-block;
      background-image: url("../assets/icons/markers.png");
      background-repeat: no-repeat;
      background-size: 215px 172px;
    }

    .marker-icon.attack1 { background-position:    0px    0px; }
    .marker-icon.attack2 { background-position:  -43px    0px; }
    .marker-icon.attack3 { background-position:  -86px    0px; }
    .marker-icon.attack4 { background-position: -129px    0px; }
    .marker-icon.bind1   { background-position: -129px  -43px; }
    .marker-icon.bind2   { background-position: -172px  -43px; }

    .btn-marker-icon.attack   { background-position:    0px    0px; }
    .btn-marker-icon.bind     { background-position: -129px  -43px; }
    .btn-marker-icon.triangle { background-position:  -43px -130px; }

    /* ボタン */
    .button-area {
      width: 150px;
      display: grid;
      grid-template-columns: repeat(3, 48px);
      gap: 6px;
      margin-right: 10px;
    }

    .button-area button {
      width: 48px;
      height: 48px;
      border: 1px solid #888;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      background: #f5f5f5;
      transition: background-color 0.2s;
    }

    .button-area button:hover { background: #e8e8e8; }
    .button-area.is-hidden { visibility: hidden; pointer-events: none; }

    /* ジョブアイコン */
    .job-icon {
      width: 56px;
      height: 56px;
      margin-right: 10px;
      background: #fff;
      flex: 0 0 56px;
    }

    .job-icon img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
    }

    /* HP/MP バー */
    .hpmp { 
      width: 250px; 
      margin-right: 10px;
    }

    .hpmp > div:first-child {
      font-size: 12px;
      margin-bottom: 2px;
    }

    .bar-wrap {
      height: 10px;
      background: #eee;
      border: 1px solid #bbb;
      border-radius: 6px;
      margin: 3px 0;
      overflow: hidden;
    }

    .bar-wrap.hp { opacity: 0.7; }
    .bar-wrap.mp { opacity: 0.7; }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
    }

    .bar-fill.hp-fill { background: #4caf50; }
    .bar-fill.mp-fill { background: #2196f3; }

    /* ステータス（デバフアイコン） */
    .status { 
      flex: 1; 
      font-size: 12px; 
      color: #333; 
      display: flex; 
      align-items: center; 
      gap: 4px; 
    }

    .debuff-icon {
      width: 48px;
      height: 48px;
      margin-right: 2px;
      display: inline-block;
      vertical-align: middle;
    }

    /* 結果メッセージ */
    #result { 
      text-align: center; 
      margin-top: 16px; 
      font-size: 16px; 
      font-weight: bold; 
      min-height: 24px;
      transition: color 0.3s;
    }

    .correct { color: #4caf50; }
    .incorrect { color: #f44336; }
  </style>
</head>
<body>
  <h2>TOP P5 Marking Sim</h2>
  
  <div class="controls">
    <label>
      Mode:
      <select id="modeSelect">
        <option value="sigma">Sigma</option>
        <option value="omega1">Omega 1</option>
        <option value="omega2">Omega 2</option>
      </select>
    </label>
    <button id="resetBtn">Reset</button>
  </div>

  <div class="party-list" id="partyList"></div>
  <div id="result"></div>

  <script>
    // ============================================================
    // Constants
    // ============================================================
    const ALL = [0, 1, 2, 3, 4, 5, 6, 7];
    const JOBS = ["WhiteMage", "Paladin", "DarkKnight", "Monk", "Ninja", "Dancer", "Pictomancer", "Scholar"];
    
    const DEBUFF_ICONS = {
      dynamis_stack1: "dynamis_stack1.png",
      dynamis_stack2: "dynamis_stack2.png",
      dynamis_stack3: "dynamis_stack3.png",
      hello_far: "hello_far.png",
      hello_near: "hello_near.png",
      first_target: "first_target.png",
      second_target: "second_target.png"
    };

    const SPRITE_MARKERS = new Set(["attack1", "attack2", "attack3", "attack4", "bind1", "bind2"]);

    // ============================================================
    // State
    // ============================================================
    const state = {
      mode: "sigma",
      members: [],
      attackCount: 0,
      bindCount: 0,
      correctAnswer: [],
      resolvedRows: new Set()
    };

    // ============================================================
    // Utility Functions
    // ============================================================
    function getRandomItems(arr, count) {
      return [...arr]
        .sort(() => Math.random() - 0.5)
        .slice(0, count);
    }

    function createEl(tag, className = "", text = "") {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (text) el.textContent = text;
      return el;
    }

    function resetState() {
      state.attackCount = 0;
      state.bindCount = 0;
      state.members = [];
      state.correctAnswer = [];
      state.resolvedRows = new Set();
    }

    // ============================================================
    // Member Initialization
    // ============================================================
    function createBaseMembers() {
      return Array(8).fill(null).map((_, i) => ({
        id: i,
        job: JOBS[i],
        debuffs: [],
        markers: []
      }));
    }

    function pushAnswer(index, marker) {
      state.correctAnswer.push({ index, marker });
    }

    function initMembersSigma() {
      const members = createBaseMembers();
      const stackIndices = getRandomItems(ALL, 6);
      stackIndices.forEach(i => members[i].debuffs.push("dynamis_stack1"));

      const markerIndices = ALL.filter(i => !members[i].debuffs.includes("dynamis_stack1"));
      const [farIdx, nearIdx] = getRandomItems(markerIndices, 2);
      members[farIdx].debuffs.push("hello_far");
      members[nearIdx].debuffs.push("hello_near");

      state.correctAnswer = [];
      const noMarkerIndices = ALL.filter(i =>
        members[i].debuffs.includes("hello_far") || members[i].debuffs.includes("hello_near")
      );
      const target = ALL.filter(i => !noMarkerIndices.includes(i)).sort((a, b) => a - b);

      pushAnswer(target[0], "bind1");
      pushAnswer(target[1], "bind2");
      target.slice(2).forEach((idx, i) => pushAnswer(idx, `attack${i + 1}`));

      return members;
    }

    function initMembersOmega1() {
      const members = createBaseMembers();

      // 対象: 8人 - stack2*4 + stack1*4
      const stack2Indices = getRandomItems(ALL, 4);
      stack2Indices.forEach(i => members[i].debuffs.push("dynamis_stack2"));
      ALL.filter(i => !stack2Indices.includes(i))
        .forEach(i => members[i].debuffs.push("dynamis_stack1"));

      // 対象: 1人 - first_target hello_near
      const firstNearIdx = getRandomItems(ALL, 1)[0];
      members[firstNearIdx].debuffs.push("first_target", "hello_near");

      // 対象: 1人 - first_target hello_far
      const firstFarIdx = getRandomItems(ALL.filter(i => i !== firstNearIdx), 1)[0];
      members[firstFarIdx].debuffs.push("first_target", "hello_far");

      // 対象: 1人 - second_target hello_near
      const secondNearIdx = getRandomItems(ALL.filter(i => ![firstNearIdx, firstFarIdx].includes(i)), 1)[0];
      members[secondNearIdx].debuffs.push("second_target", "hello_near");

      // 対象: 1人 - second_target hello_far
      const secondFarIdx = getRandomItems(ALL.filter(i => ![firstNearIdx, firstFarIdx, secondNearIdx].includes(i)), 1)[0];
      members[secondFarIdx].debuffs.push("second_target", "hello_far");

      // 正解計算
      state.correctAnswer = [];
      const eligible = ALL.filter(i => ![firstNearIdx, firstFarIdx].includes(i));

      const bindPriority = (idx) => {
        const d = members[idx].debuffs;
        if (d.includes("dynamis_stack2") && d.includes("second_target")) return 0;
        if (d.includes("dynamis_stack2")) return 1;
        return 2;
      };

      const bindSelected = [...eligible]
        .sort((a, b) => (bindPriority(a) - bindPriority(b)) || (a - b))
        .slice(0, 2);

      bindSelected.forEach((idx, i) => pushAnswer(idx, `bind${i + 1}`));

      const remaining4 = eligible.filter(i => !bindSelected.includes(i));

      const attackPriority = (idx) =>
        members[idx].debuffs.includes("dynamis_stack2") ? 0 : 1;

      const attackOrder = [...remaining4]
        .sort((a, b) => (attackPriority(a) - attackPriority(b)) || (a - b));

      attackOrder.forEach((idx, i) => pushAnswer(idx, `attack${i + 1}`));

      return members;
    }

    function initMembersOmega2() {
      const members = createBaseMembers();

      // 対象: 1人 - stack2 second_target hello_near
      const stack2SecondNearIdx = getRandomItems(ALL, 1)[0];
      members[stack2SecondNearIdx].debuffs.push("dynamis_stack2", "second_target", "hello_near");

      // 対象: 1人 - stack2 second_target hello_far
      const stack2SecondFarIdx = getRandomItems(ALL.filter(i => i !== stack2SecondNearIdx), 1)[0];
      members[stack2SecondFarIdx].debuffs.push("dynamis_stack2", "second_target", "hello_far");

      const remaining = ALL.filter(i => ![stack2SecondNearIdx, stack2SecondFarIdx].includes(i));

      // 対象: 2人 - stack3
      const stack3Indices = getRandomItems(remaining, 2);
      stack3Indices.forEach(i => members[i].debuffs.push("dynamis_stack3"));

      // 対象: 2人 - stack2
      const stack2Indices = remaining.filter(i => !stack3Indices.includes(i));
      stack2Indices.forEach(i => members[i].debuffs.push("dynamis_stack2"));

      // 正解計算
      state.correctAnswer = [];
      [...stack3Indices].sort((a, b) => a - b)
        .forEach((idx, i) => pushAnswer(idx, `bind${i + 1}`));
      [...stack2Indices].sort((a, b) => a - b)
        .forEach((idx, i) => pushAnswer(idx, `attack${i + 1}`));

      return members;
    }

    const MODE_INITIALIZERS = {
      sigma: initMembersSigma,
      omega1: initMembersOmega1,
      omega2: initMembersOmega2
    };

    // ============================================================
    // DOM Creation
    // ============================================================
    function createBars(jobLabel) {
      const hpmp = createEl("div", "hpmp");
      hpmp.appendChild(createEl("div", "", jobLabel));

      const hpBar = createEl("div", "bar-wrap hp");
      hpBar.appendChild(createEl("div", "bar-fill hp-fill"));
      hpmp.appendChild(hpBar);

      const mpBar = createEl("div", "bar-wrap mp");
      mpBar.appendChild(createEl("div", "bar-fill mp-fill"));
      hpmp.appendChild(mpBar);

      return hpmp;
    }

    function createButtonArea(rowIndex) {
      const buttons = createEl("div", "button-area");
      const markerTypes = [
        { type: "triangle", alt: "Triangle" },
        { type: "bind", alt: "Bind" },
        { type: "attack", alt: "Attack" }
      ];

      markerTypes.forEach(({ type, alt }) => {
        const btn = createEl("button");
        btn.setAttribute("type", "button");
        btn.setAttribute("aria-label", alt);
        btn.title = alt;

        const icon = createEl("span", `btn-marker-icon ${type}`);
        btn.appendChild(icon);
        btn.addEventListener("click", () => onClickButton(rowIndex, type));

        buttons.appendChild(btn);
      });

      return buttons;
    }

    function createRow(index) {
      const row = createEl("div", "row");
      row.dataset.index = index;

      const inputCol = createEl("div", "col input-col");
      inputCol.appendChild(createEl("div", "marker-area"));

      const answerCol = createEl("div", "col answer-col");
      answerCol.appendChild(createEl("div", "answer-area"));

      const jobIcon = createEl("div", "job-icon");
      const img = document.createElement("img");
      img.src = `../assets/icons/jobs/${JOBS[index]}.png`;
      img.alt = JOBS[index];
      jobIcon.appendChild(img);

      const statusArea = createEl("div", "status");
      const member = state.members[index];
      statusArea.innerHTML = member.debuffs
        .map(d => `<img class="debuff-icon" src="../assets/icons/debuffs/${DEBUFF_ICONS[d]}" alt="${d}" title="${d}">`)
        .join("");

      row.append(
        inputCol,
        createButtonArea(index),
        jobIcon,
        createBars(JOBS[index]),
        statusArea,
        answerCol
      );

      return row;
    }

    // ============================================================
    // Marker Rendering
    // ============================================================
    function renderMarkerChip(marker) {
      if (SPRITE_MARKERS.has(marker)) {
        return createEl("span", `marker-icon ${marker}`);
      }
      const chip = createEl("span", "marker-chip");
      const isAttack = marker.startsWith("attack");
      const num = marker.replace(/^(attack|bind)/, "");
      chip.textContent = (isAttack ? "A" : "B") + num;
      return chip;
    }

    function showCorrectAnswer() {
      state.members.forEach((_, i) => {
        const row = document.querySelector(`.row[data-index="${i}"]`);
        row.querySelector(".answer-area").innerHTML = "";
      });

      state.correctAnswer.forEach(ans => {
        const row = document.querySelector(`.row[data-index="${ans.index}"]`);
        row.querySelector(".answer-area").appendChild(renderMarkerChip(ans.marker));
      });
    }

    // ============================================================
    // Event Handlers
    // ============================================================
    function updateResultState(isCorrect) {
      const partyList = document.getElementById("partyList");
      partyList.classList.remove("is-correct", "is-incorrect");
      partyList.classList.add(isCorrect ? "is-correct" : "is-incorrect");

      document.querySelectorAll(".marker-area").forEach(area => {
        area.classList.remove("is-correct", "is-incorrect");
        area.classList.add(isCorrect ? "is-correct" : "is-incorrect");
      });
    }

    function checkAnswer() {
      const resultDiv = document.getElementById("result");
      const inputCount = state.members.reduce((sum, m) => sum + m.markers.length, 0);
      const isCorrect = state.correctAnswer.length === inputCount &&
        state.correctAnswer.every(ans => state.members[ans.index].markers.includes(ans.marker));

      resultDiv.textContent = isCorrect ? "正解" : "不正解（正解を表示しました）";
      resultDiv.className = isCorrect ? "correct" : "incorrect";

      updateResultState(isCorrect);
      showCorrectAnswer();
    }

    function onClickButton(rowIndex, type) {
      if (state.resolvedRows.has(rowIndex)) return;

      const row = document.querySelector(`.row[data-index="${rowIndex}"]`);
      const markerArea = row.querySelector(".marker-area");
      const buttonArea = row.querySelector(".button-area");
      const resultDiv = document.getElementById("result");

      let accepted = false;

      if (type === "attack") {
        if (state.attackCount >= 4) {
          resultDiv.textContent = "Attack は 4 つまでです";
          resultDiv.className = "incorrect";
          return;
        }
        const marker = `attack${++state.attackCount}`;
        state.members[rowIndex].markers.push(marker);
        markerArea.innerHTML = "";
        markerArea.appendChild(renderMarkerChip(marker));
        accepted = true;
      } else if (type === "bind") {
        if (state.bindCount >= 2) {
          resultDiv.textContent = "Bind は 2 つまでです";
          resultDiv.className = "incorrect";
          return;
        }
        const marker = `bind${++state.bindCount}`;
        state.members[rowIndex].markers.push(marker);
        markerArea.innerHTML = "";
        markerArea.appendChild(renderMarkerChip(marker));
        accepted = true;
      } else if (type === "triangle") {
        markerArea.innerHTML = "";
        accepted = true;
      }

      if (!accepted) return;

      buttonArea.classList.add("is-hidden");
      state.resolvedRows.add(rowIndex);

      if (state.resolvedRows.size === 8) {
        checkAnswer();
      } else {
        resultDiv.textContent = "";
        resultDiv.className = "";
      }
    }

    function init() {
      resetState();

      const mode = document.getElementById("modeSelect").value;
      state.mode = mode;
      state.members = MODE_INITIALIZERS[mode]();

      const partyList = document.getElementById("partyList");
      partyList.innerHTML = "";
      partyList.classList.remove("is-correct", "is-incorrect");
      state.members.forEach((_, i) => partyList.appendChild(createRow(i)));

      const result = document.getElementById("result");
      result.textContent = "";
      result.className = "";
    }

    // ============================================================
    // Initialize
    // ============================================================
    document.getElementById("modeSelect").addEventListener("change", init);
    document.getElementById("resetBtn").addEventListener("click", init);
    init();
  </script>
</body>
</html>
